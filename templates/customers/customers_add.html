{% extends "pos/base.html" %}

<!-- Page title  -->
{% block title %}Mijoz qo'shish{% endblock title %}

<!-- Specific Page CSS goes HERE  -->
{% block stylesheets %}{% endblock stylesheets %}

<!-- Page Heading -->
{% block heading %}Mijoz qo'shish{% endblock heading %}

<!-- Page content  -->
{% block content %}
<!--Go back-->
<div class="row ml-0 mb-3">
    <a href="{% url 'customers:customers_list' %}">
        <button type="button" class="btn btn-info font-weight-bold">
            <i class="fas fa-long-arrow-alt-left mr-2"></i>
            Orqaga
        </button>
    </a>
</div>

<div class="row">
    <div class="card col-md-8">
        <div class="card-body">
            <form action="{% url 'customers:customers_add' %}"  method="post">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="inputDescription">Ism</label>
                        <input type="text" class="form-control" name="first_name" placeholder="Ism..." required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="inputDescription">Familiya</label>
                        <input type="text" class="form-control" name="last_name" placeholder="Familiya..." required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="inputDescription">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="johndoe@gmail.com" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="inputDescription">Telefon raqami</label>
                        <input type="text" name="phone" class="form-control" placeholder="+998 90 123 45 67" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-12">
                        <label for="inputDescription">Manzil</label>
                        <textarea name="address" class="form-control" placeholder="Toshkent shahar, Chilonzor tumani..." rows="2" required></textarea>
                    </div>
                </div>
                

                <button type="submit" class="btn btn-success font-weight-bold">Mijoz yaratish</button>
               
            </form>
        </div>
    </div>
</div>
{% endblock content %}

<!-- Specific Page JS goes HERE  -->
{% block javascripts %}{% endblock javascripts %}
